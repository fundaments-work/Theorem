name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to update (e.g. v1.0.0-beta.1)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

jobs:
  create-release:
    name: Create Release
    if: github.event_name == 'workflow_dispatch' || github.event.deleted == false
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
      release_upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${RELEASE_TAG#v}" >> $GITHUB_OUTPUT

      - name: Check existing release tag
        id: release-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          response="$(curl --silent --show-error --write-out '\n%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
          status="$(printf '%s' "${response}" | tail -n1)"
          body="$(printf '%s' "${response}" | sed '$d')"
          if [[ "${status}" == "200" ]]; then
            release_id="$(printf '%s' "${body}" | jq -r '.id // empty')"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "release_id=${release_id}" >> "$GITHUB_OUTPUT"
            echo "Release for ${RELEASE_TAG} already exists and will be updated."
          elif [[ "${status}" == "404" ]]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "release_id=" >> "$GITHUB_OUTPUT"
            echo "::notice::No release found for ${RELEASE_TAG}. A new draft release will be created."
          else
            echo "::error::GitHub API returned unexpected status ${status} while checking release tag ${RELEASE_TAG}."
            exit 1
          fi

      - name: Create or Update Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Theorem ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Features

            - Reflowable reader support for EPUB, MOBI, AZW/AZW3, FB2, and CBZ.
            - PDF reading via PDF.js with annotation tooling.
            - RSS feed reading mode with article extraction.
            - Library management with import, shelves, bookmarks, and progress tracking.
            - Local-first Markdown export and Obsidian/Logseq vault sync.

            ## Included In This Beta Update

            - Fixed an EPUB issue where opening could get stuck on `Loading book...`.
            - Added stronger storage read fallback/timeout handling for non-PDF books.
            - Improved resume-location handling to skip invalid synthetic section targets.

            ## Downloads

            | Platform | Download |
            |----------|----------|
            | Windows | `.msi` or `.exe` installer |
            | macOS (Intel) | `.dmg` installer |
            | macOS (Apple Silicon) | `.dmg` installer |
            | Linux | `.AppImage` or `.deb` package |
            | Android | `.apk` |
          draft: true
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}
          generate_release_notes: false

  build-linux:
    name: Build Linux
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.event_name == 'workflow_dispatch' || github.event.deleted == false)
    runs-on: ubuntu-22.04
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Theorem ${{ env.RELEASE_TAG }}"
          releaseDraft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          retryAttempts: 2
          args: --target x86_64-unknown-linux-gnu

  build-macos-intel:
    name: Build macOS (Intel)
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.event_name == 'workflow_dispatch' || github.event.deleted == false)
    runs-on: macos-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-intel-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-intel-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve macOS signing mode
        id: macos-signing
        shell: bash
        run: |
          if [[ "${{ vars.ENABLE_MACOS_SIGNING }}" == "true" \
            && -n "${{ secrets.APPLE_CERTIFICATE }}" \
            && -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            && -n "${{ secrets.APPLE_ID }}" \
            && -n "${{ secrets.APPLE_PASSWORD }}" \
            && -n "${{ secrets.APPLE_TEAM_ID }}" ]]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
          else
            echo "mode=adhoc" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri app (signed)
        if: steps.macos-signing.outputs.mode == 'signed'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Theorem ${{ env.RELEASE_TAG }}"
          releaseDraft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          retryAttempts: 2
          args: --target x86_64-apple-darwin

      - name: Build Tauri app (ad-hoc signing)
        if: steps.macos-signing.outputs.mode == 'adhoc'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Theorem ${{ env.RELEASE_TAG }}"
          releaseDraft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          retryAttempts: 2
          args: --target x86_64-apple-darwin

  build-macos-arm:
    name: Build macOS (Apple Silicon)
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.event_name == 'workflow_dispatch' || github.event.deleted == false)
    runs-on: macos-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-arm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-arm-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve macOS signing mode
        id: macos-signing
        shell: bash
        run: |
          if [[ "${{ vars.ENABLE_MACOS_SIGNING }}" == "true" \
            && -n "${{ secrets.APPLE_CERTIFICATE }}" \
            && -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            && -n "${{ secrets.APPLE_ID }}" \
            && -n "${{ secrets.APPLE_PASSWORD }}" \
            && -n "${{ secrets.APPLE_TEAM_ID }}" ]]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
          else
            echo "mode=adhoc" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri app (signed)
        if: steps.macos-signing.outputs.mode == 'signed'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Theorem ${{ env.RELEASE_TAG }}"
          releaseDraft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          retryAttempts: 2
          args: --target aarch64-apple-darwin

      - name: Build Tauri app (ad-hoc signing)
        if: steps.macos-signing.outputs.mode == 'adhoc'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Theorem ${{ env.RELEASE_TAG }}"
          releaseDraft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          retryAttempts: 2
          args: --target aarch64-apple-darwin

  build-windows:
    name: Build Windows
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.event_name == 'workflow_dispatch' || github.event.deleted == false)
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Theorem ${{ env.RELEASE_TAG }}"
          releaseDraft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          retryAttempts: 2

  build-android:
    name: Build Android
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.event_name == 'workflow_dispatch' || github.event.deleted == false)
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;29.0.13846066"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-android-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android project
        run: pnpm tauri android init --ci

      - name: Generate branded Android launcher icons
        run: pnpm tauri icon public/favicon.svg

      - name: Disable Android release minification
        run: |
          sed -i '0,/isMinifyEnabled = true/s//isMinifyEnabled = false/' src-tauri/gen/android/app/build.gradle.kts
          grep -n "isMinifyEnabled" src-tauri/gen/android/app/build.gradle.kts

      - name: Configure Android Gradle signing
        shell: bash
        run: |
          FILE="src-tauri/gen/android/app/build.gradle.kts"

          if ! grep -q 'import java.io.FileInputStream' "$FILE"; then
            sed -i '1a import java.io.FileInputStream' "$FILE"
          fi

          if ! grep -q 'signingConfigs {' "$FILE"; then
            printf '%s\n' \
              'signingConfigs {' \
              '    create("release") {' \
              '        val keystorePropertiesFile = rootProject.file("keystore.properties")' \
              '        val keystoreProperties = Properties()' \
              '        if (keystorePropertiesFile.exists()) {' \
              '            keystoreProperties.load(FileInputStream(keystorePropertiesFile))' \
              '        }' \
              '        keyAlias = keystoreProperties["keyAlias"] as String' \
              '        keyPassword = keystoreProperties["password"] as String' \
              '        storeFile = file(keystoreProperties["storeFile"] as String)' \
              '        storePassword = keystoreProperties["password"] as String' \
              '    }' \
              '}' > /tmp/theorem-signing-snippet.kts
            awk '
              BEGIN { inserted=0 }
              /buildTypes \{/ && !inserted {
                while ((getline line < "/tmp/theorem-signing-snippet.kts") > 0) {
                  print "    " line
                }
                close("/tmp/theorem-signing-snippet.kts")
                inserted=1
              }
              { print }
            ' "$FILE" > "$FILE.tmp"
            mv "$FILE.tmp" "$FILE"
          fi

          if ! grep -q 'signingConfig = signingConfigs.getByName("release")' "$FILE"; then
            sed -i '/getByName("release") {/a\            signingConfig = signingConfigs.getByName("release")' "$FILE"
          fi

          grep -n 'FileInputStream\|signingConfigs\|signingConfig = signingConfigs.getByName("release")' "$FILE"

      - name: Debug Android signing inputs (safe)
        shell: bash
        run: |
          echo "secret.ANDROID_KEY_BASE64 set: ${{ secrets.ANDROID_KEY_BASE64 != '' }}"
          echo "secret.ANDROID_KEYSTORE_BASE64 set: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}"
          echo "secret.ANDROID_KEY_ALIAS set: ${{ secrets.ANDROID_KEY_ALIAS != '' }}"
          echo "secret.ANDROID_KEY_PASSWORD set: ${{ secrets.ANDROID_KEY_PASSWORD != '' }}"
          echo "secret.ANDROID_KEYSTORE_PASSWORD set: ${{ secrets.ANDROID_KEYSTORE_PASSWORD != '' }}"
          echo "var.ANDROID_KEY_BASE64 set: ${{ vars.ANDROID_KEY_BASE64 != '' }}"
          echo "var.ANDROID_KEYSTORE_BASE64 set: ${{ vars.ANDROID_KEYSTORE_BASE64 != '' }}"
          echo "var.ANDROID_KEY_ALIAS set: ${{ vars.ANDROID_KEY_ALIAS != '' }}"
          echo "var.ANDROID_KEY_PASSWORD set: ${{ vars.ANDROID_KEY_PASSWORD != '' }}"
          echo "var.ANDROID_KEYSTORE_PASSWORD set: ${{ vars.ANDROID_KEYSTORE_PASSWORD != '' }}"

      - name: Validate Android signing secrets
        shell: bash
        env:
          ANDROID_KEY_BASE64_VAR: ${{ vars.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEYSTORE_BASE64_VAR: ${{ vars.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD_VAR: ${{ vars.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS_VAR: ${{ vars.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD_VAR: ${{ vars.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEY_B64="$ANDROID_KEY_BASE64"
          if [[ -z "$KEY_B64" ]]; then
            KEY_B64="$ANDROID_KEYSTORE_BASE64"
          fi
          if [[ -z "$KEY_B64" ]]; then
            KEY_B64="$ANDROID_KEY_BASE64_VAR"
          fi
          if [[ -z "$KEY_B64" ]]; then
            KEY_B64="$ANDROID_KEYSTORE_BASE64_VAR"
          fi
          KEY_ALIAS="$ANDROID_KEY_ALIAS"
          if [[ -z "$KEY_ALIAS" ]]; then
            KEY_ALIAS="$ANDROID_KEY_ALIAS_VAR"
          fi
          KEY_PASSWORD="$ANDROID_KEY_PASSWORD"
          if [[ -z "$KEY_PASSWORD" ]]; then
            KEY_PASSWORD="$ANDROID_KEY_PASSWORD_VAR"
          fi
          STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
          if [[ -z "$STORE_PASSWORD" ]]; then
            STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD_VAR"
          fi
          if [[ -z "$STORE_PASSWORD" ]]; then
            STORE_PASSWORD="$KEY_PASSWORD"
          fi
          if [[ -z "$KEY_B64" || -z "$KEY_ALIAS" || -z "$KEY_PASSWORD" ]]; then
            echo "::error::Missing Android signing settings. Required: ANDROID_KEY_BASE64 (or ANDROID_KEYSTORE_BASE64), ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD. Optional: ANDROID_KEYSTORE_PASSWORD (defaults to ANDROID_KEY_PASSWORD)."
            exit 1
          fi

      - name: Setup Android signing
        shell: bash
        env:
          ANDROID_KEY_BASE64_VAR: ${{ vars.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEYSTORE_BASE64_VAR: ${{ vars.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD_VAR: ${{ vars.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS_VAR: ${{ vars.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD_VAR: ${{ vars.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEY_B64="$ANDROID_KEY_BASE64"
          if [[ -z "$KEY_B64" ]]; then
            KEY_B64="$ANDROID_KEYSTORE_BASE64"
          fi
          if [[ -z "$KEY_B64" ]]; then
            KEY_B64="$ANDROID_KEY_BASE64_VAR"
          fi
          if [[ -z "$KEY_B64" ]]; then
            KEY_B64="$ANDROID_KEYSTORE_BASE64_VAR"
          fi
          KEY_ALIAS="$ANDROID_KEY_ALIAS"
          if [[ -z "$KEY_ALIAS" ]]; then
            KEY_ALIAS="$ANDROID_KEY_ALIAS_VAR"
          fi
          KEY_PASSWORD="$ANDROID_KEY_PASSWORD"
          if [[ -z "$KEY_PASSWORD" ]]; then
            KEY_PASSWORD="$ANDROID_KEY_PASSWORD_VAR"
          fi
          STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
          if [[ -z "$STORE_PASSWORD" ]]; then
            STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD_VAR"
          fi
          if [[ -z "$STORE_PASSWORD" ]]; then
            STORE_PASSWORD="$KEY_PASSWORD"
          fi
          printf '%s' "$KEY_B64" | base64 --decode > "$RUNNER_TEMP/theorem-release.jks"
          cat > src-tauri/gen/android/keystore.properties <<EOF
          keyAlias=$KEY_ALIAS
          password=$KEY_PASSWORD
          storeFile=$RUNNER_TEMP/theorem-release.jks
          EOF

      - name: Build Android release artifacts
        run: pnpm tauri android build

      - name: Collect signed Android artifacts
        shell: bash
        run: |
          mkdir -p android-release
          find src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' ! -name '*-unsigned.apk' -exec cp {} android-release/ \;
          find src-tauri/gen/android/app/build/outputs/bundle -type f -name '*.aab' -exec cp {} android-release/ \;
          ls -lah android-release
          if ! compgen -G "android-release/*.apk" > /dev/null; then
            echo "::error::No signed APK found in build outputs."
            exit 1
          fi

      - name: Upload Android artifacts (attempt 1)
        id: upload-android-attempt-1
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          files: |
            android-release/*.apk
            android-release/*.aab

      - name: Upload Android artifacts (retry)
        if: steps.upload-android-attempt-1.outcome == 'failure'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          files: |
            android-release/*.apk
            android-release/*.aab

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos-intel, build-macos-arm, build-windows, build-android]
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name == 'workflow_dispatch' || github.event.deleted == false) &&
      always() &&
      needs.build-linux.result == 'success' &&
      needs.build-macos-intel.result == 'success' &&
      needs.build-macos-arm.result == 'success' &&
      needs.build-windows.result == 'success' &&
      needs.build-android.result == 'success'
    steps:
      - name: Publish Release
        run: echo "All builds completed successfully. Release is ready for review."
