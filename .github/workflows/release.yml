name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
      release_upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          name: Theorem ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## What's Changed
            
            See [CHANGELOG.md](./CHANGELOG.md) for details.
            
            ## Downloads
            
            | Platform | Download |
            |----------|----------|
            | Windows | `.msi` or `.exe` installer |
            | macOS (Intel) | `.dmg` installer |
            | macOS (Apple Silicon) | `.dmg` installer |
            | Linux | `.AppImage` or `.deb` package |
            | Android | `.apk` |
          draft: true
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}
          generate_release_notes: true

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Theorem ${{ github.ref_name }}"
          releaseBody: "See assets below."
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --target x86_64-unknown-linux-gnu

      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm

  build-macos-intel:
    name: Build macOS (Intel)
    runs-on: macos-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-intel-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-intel-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve macOS signing mode
        id: macos-signing
        shell: bash
        run: |
          if [[ "${{ vars.ENABLE_MACOS_SIGNING }}" == "true" \
            && -n "${{ secrets.APPLE_CERTIFICATE }}" \
            && -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            && -n "${{ secrets.APPLE_ID }}" \
            && -n "${{ secrets.APPLE_PASSWORD }}" \
            && -n "${{ secrets.APPLE_TEAM_ID }}" ]]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
          else
            echo "mode=adhoc" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri app (signed)
        if: steps.macos-signing.outputs.mode == 'signed'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Theorem ${{ github.ref_name }}"
          releaseBody: "See assets below."
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --target x86_64-apple-darwin

      - name: Build Tauri app (ad-hoc signing)
        if: steps.macos-signing.outputs.mode == 'adhoc'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Theorem ${{ github.ref_name }}"
          releaseBody: "See assets below."
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --target x86_64-apple-darwin

      - name: Upload macOS Intel artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app

  build-macos-arm:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-arm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-arm-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve macOS signing mode
        id: macos-signing
        shell: bash
        run: |
          if [[ "${{ vars.ENABLE_MACOS_SIGNING }}" == "true" \
            && -n "${{ secrets.APPLE_CERTIFICATE }}" \
            && -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            && -n "${{ secrets.APPLE_ID }}" \
            && -n "${{ secrets.APPLE_PASSWORD }}" \
            && -n "${{ secrets.APPLE_TEAM_ID }}" ]]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
          else
            echo "mode=adhoc" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri app (signed)
        if: steps.macos-signing.outputs.mode == 'signed'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Theorem ${{ github.ref_name }}"
          releaseBody: "See assets below."
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --target aarch64-apple-darwin

      - name: Build Tauri app (ad-hoc signing)
        if: steps.macos-signing.outputs.mode == 'adhoc'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Theorem ${{ github.ref_name }}"
          releaseBody: "See assets below."
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --target aarch64-apple-darwin

      - name: Upload macOS ARM artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Theorem ${{ github.ref_name }}"
          releaseBody: "See assets below."
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;29.0.13846066"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-android-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android project
        run: pnpm tauri android init --ci

      - name: Generate branded Android launcher icons
        run: pnpm tauri icon public/favicon.svg

      - name: Disable Android release minification
        run: |
          sed -i '0,/isMinifyEnabled = true/s//isMinifyEnabled = false/' src-tauri/gen/android/app/build.gradle.kts
          grep -n "isMinifyEnabled" src-tauri/gen/android/app/build.gradle.kts

      - name: Decode signing keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo $ANDROID_KEYSTORE_BASE64 | base64 --decode > keystore.jks

      - name: Build Android APK (unsigned release)
        if: env.ANDROID_KEYSTORE_BASE64 == ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: pnpm tauri android build --release

      - name: Build Android APK (signed)
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: pnpm tauri android build --release

      - name: Upload Android artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos-intel, build-macos-arm, build-windows, build-android]
    if: >-
      always() &&
      needs.build-linux.result == 'success' &&
      needs.build-macos-intel.result == 'success' &&
      needs.build-macos-arm.result == 'success' &&
      needs.build-windows.result == 'success' &&
      needs.build-android.result == 'success'
    steps:
      - name: Publish Release
        run: echo "All builds completed successfully. Release is ready for review."
